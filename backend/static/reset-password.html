<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BluePath 비밀번호 재설정</title>
  <style>
    :root { color-scheme: light; --navy:#06223f; --ocean:#0e7490; --cyan:#18d6d2; --bg:#effafb; --text:#17324d; --muted:#64748b; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif; color:var(--text); background:radial-gradient(circle at 20% 10%,#71f0ec55,transparent 35%),linear-gradient(145deg,#06223f,#0e7490 58%,#18d6d2); }
    main { width:min(100%,460px); background:#ffffffee; border:1px solid #ffffffaa; border-radius:28px; box-shadow:0 28px 70px #02152866; overflow:hidden; backdrop-filter:blur(16px); }
    header { padding:30px 30px 24px; color:white; background:linear-gradient(135deg,var(--navy),var(--ocean)); }
    .mark { font-size:12px; font-weight:800; letter-spacing:.16em; color:#bffbfa; }
    h1 { margin:8px 0 8px; font-size:30px; letter-spacing:.02em; }
    header p { margin:0; line-height:1.6; color:#d9ffff; }
    form { padding:28px 30px 30px; }
    label { display:block; margin:0 0 8px; font-weight:800; font-size:13px; }
    input { width:100%; min-height:50px; margin-bottom:16px; padding:0 14px; border:1px solid #cbd5e1; border-radius:14px; font-size:15px; color:var(--text); background:white; outline:none; }
    input:focus { border-color:var(--ocean); box-shadow:0 0 0 4px #18d6d225; }
    button { width:100%; min-height:52px; border:0; border-radius:15px; font-weight:800; font-size:15px; color:white; cursor:pointer; background:linear-gradient(135deg,var(--ocean),#0891b2); }
    button:disabled { opacity:.6; cursor:wait; }
    #message { display:none; margin:16px 0 0; padding:12px 14px; border-radius:12px; line-height:1.5; font-size:14px; }
    #message.ok { display:block; color:#065f46; background:#d1fae5; }
    #message.error { display:block; color:#991b1b; background:#fee2e2; }
    .note { margin:18px 0 0; color:var(--muted); font-size:12px; line-height:1.55; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="mark">BLUEPATH · SECURE ACCOUNT</div>
      <h1>새 비밀번호 설정</h1>
      <p>메일로 받은 일회용 링크에서 새 비밀번호를 등록합니다.</p>
    </header>
    <form id="resetForm">
      <label for="password">새 비밀번호</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" placeholder="8자 이상" required />
      <label for="confirm">새 비밀번호 확인</label>
      <input id="confirm" type="password" autocomplete="new-password" minlength="8" placeholder="한 번 더 입력" required />
      <button id="submitButton" type="submit">비밀번호 변경</button>
      <div id="message" role="status" aria-live="polite"></div>
      <p class="note">링크는 한 번만 사용할 수 있으며 설정된 유효 시간이 지나면 만료됩니다. 변경이 완료되면 BluePath 앱으로 돌아가 새 비밀번호로 로그인하세요.</p>
    </form>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const form = document.getElementById('resetForm');
    const button = document.getElementById('submitButton');
    const message = document.getElementById('message');

    function show(text, kind) {
      message.textContent = text;
      message.className = kind;
    }

    if (!token) {
      show('재설정 토큰이 없습니다. 앱에서 새 링크를 요청해 주세요.', 'error');
      button.disabled = true;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 8) return show('비밀번호는 8자 이상이어야 합니다.', 'error');
      if (password !== confirm) return show('비밀번호 확인이 일치하지 않습니다.', 'error');
      button.disabled = true;
      button.textContent = '변경 중…';
      try {
        const response = await fetch('/api/v1/auth/password-reset/confirm', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({token, newPassword: password})
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.detail || '링크가 만료되었거나 이미 사용되었습니다.');
        show(payload.message || '비밀번호가 변경되었습니다. 앱에서 로그인해 주세요.', 'ok');
        form.querySelectorAll('input').forEach(input => input.disabled = true);
        button.textContent = '변경 완료';
      } catch (error) {
        show(error.message || '비밀번호를 변경하지 못했습니다.', 'error');
        button.disabled = false;
        button.textContent = '비밀번호 변경';
      }
    });
  </script>
</body>
</html>
